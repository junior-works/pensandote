<!doctype html>
<html lang="es-AR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#faf5e9">
    <meta name="description" content="Pensándote — la app para estar cerca de los que están lejos.">

    <title>Pensándote</title>

    <!-- PWA -->
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="./assets/icon-192.png">
    <link rel="apple-touch-icon" href="./assets/icon-192.png">

    <!-- Tipografías: Atkinson Hyperlegible (UI legible para baja visión)
         + Caveat (manuscrita, para textos emocionales).
         Atkinson Hyperlegible es la tipografía base del Braille Institute
         diseñada para máxima legibilidad. Mantenerla. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Plus Jakarta Sans (400/500/700) se suma para el skin "dashboard"
         del familiar (datos y UI). Atkinson + Caveat siguen mandando en el
         modo simple del adulto mayor — ver --font-admin en styles.css. -->
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=Caveat:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap">

    <link rel="stylesheet" href="./styles.css">

    <!-- Config local (SUPABASE_URL + anon/publishable key). NO va al repo.
         Si el archivo no existe, el stub deja la app en "modo demo"
         con los mocks de js/mocks.js. -->
    <script src="./config.js" onerror="this.dataset.missing=1"></script>
    <script>
        // Si config.js faltó o no definió la URL, dejamos el flag para
        // que app.js arranque en modo demo.
        if (!window.PENSANDOTE_CONFIG || !window.PENSANDOTE_CONFIG.SUPABASE_URL) {
            window.PENSANDOTE_CONFIG = { _demo: true };
        }
    </script>
</head>
<body>
    <!-- Punto de montaje único. app.js decide qué pantalla renderizar -->
    <main id="app" aria-live="polite">
        <div class="boot-loader">
            <p>Cargando Pensándote…</p>
        </div>
    </main>

    <script type="module" src="./app.js?v=adminA1"></script>

    <!-- Registro del service worker (sólo si el navegador lo soporta) -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // updateViaCache:'none' → el browser NO usa HTTP cache para
                // pedir el service-worker.js: cada vez que se abre la PWA,
                // se chequea contra red. Sin esto, podía quedarse pegado al
                // SW viejo hasta 24h.
                navigator.serviceWorker.register('./service-worker.js', { updateViaCache: 'none' })
                    .then(reg => {
                        // Si aparece un SW nuevo esperando, le decimos que
                        // tome el control ya (saltea esperar a que cierren
                        // todas las tabs).
                        reg.addEventListener('updatefound', () => {
                            const sw = reg.installing;
                            if (!sw) return;
                            sw.addEventListener('statechange', () => {
                                if (sw.state === 'installed' && navigator.serviceWorker.controller) {
                                    sw.postMessage('skipWaiting');
                                }
                            });
                        });
                        // Cuando el nuevo SW activa y reclama, recargamos
                        // una sola vez para que la página corra contra el
                        // nuevo shell.
                        let refreshing = false;
                        navigator.serviceWorker.addEventListener('controllerchange', () => {
                            if (refreshing) return;
                            refreshing = true;
                            window.location.reload();
                        });
                    })
                    .catch(err => console.warn('[sw] no se pudo registrar:', err));
            });
        }
    </script>
</body>
</html>
